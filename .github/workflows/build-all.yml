name: Build PC and Android

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-pc:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Node Dependencies
        run: npm install

      - name: Build Electron App
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload PC Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CoreProtectGenerator-Windows-Exe
          path: dist/*.exe

  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Node Dependencies
        run: npm install

      - name: Prepare Web Assets
        run: npm run build:web

      - name: Initialize Capacitor Android Project
        run: |
          npx cap add android || echo "Android platform already added"
          npx cap sync android

      - name: Build Android APK
        working-directory: ./android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CoreProtectGenerator-Android-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
