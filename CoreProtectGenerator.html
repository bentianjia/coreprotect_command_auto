<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreProtect Command Generator</title>
    <style>
        :root {
            --bg-body: #f5f5f7; /* Apple style slightly warmer gray */
            --bg-card: #ffffff;
            --border-color: #e5e5ea;
            --text-main: #1d1d1f;
            --text-muted: #86868b;
            --accent: #0071e3; /* Apple Blue */
            --accent-hover: #0077ed;
            --radius-lg: 18px;
            --radius-md: 10px;
            --radius-sm: 6px;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.08);
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            --spring: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1); /* Spring animation */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 4rem 1rem;
            line-height: 1.5;
        }

        .container {
            max-width: 800px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            animation: fadeSlideUp 0.6s cubic-bezier(0.25, 0.8, 0.25, 1) both;
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .header-text h1 {
            font-size: 2.2rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: var(--text-main);
        }

        .lang-switch {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 0.4rem;
            color: var(--text-main);
        }

        .lang-switch:hover {
            box-shadow: var(--shadow-md);
            transform: scale(1.02);
        }

        .lang-switch:active {
            transform: scale(0.96);
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 2.5rem;
            box-shadow: var(--shadow-md);
            transition: var(--transition);
        }

        /* Apple-style Segmented Control */
        .tabs-container {
            background: #e3e3e8;
            padding: 3px;
            border-radius: 12px;
            display: flex;
            margin-bottom: 2rem;
            position: relative;
        }

        .tab-slider {
            position: absolute;
            top: 3px;
            bottom: 3px;
            left: 3px;
            width: calc((100% - 6px) / 3);
            background: #ffffff;
            border-radius: 10px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.12), 0 3px 1px rgba(0,0,0,0.04);
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            z-index: 1;
        }

        .tab-btn {
            flex: 1;
            padding: 0.5rem 0.5rem;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-size: 0.875rem;
            font-weight: 500;
            border-radius: 10px;
            cursor: pointer;
            transition: color 0.3s ease;
            position: relative;
            z-index: 2;
            text-align: center;
        }

        .tab-btn:hover {
            color: var(--text-main);
        }

        .tab-btn.active {
            color: var(--text-main);
        }

        .grid-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        /* ======== Responsive Design - Auto Screen Adaptation ======== */

        /* Tablet & small laptop (≤768px) */
        @media (max-width: 768px) {
            body {
                padding: 2rem 1rem;
            }

            .header-text h1 {
                font-size: 1.8rem;
            }

            .card {
                padding: 1.8rem;
            }

            .grid-layout {
                gap: 1.2rem;
            }
        }

        /* Phone landscape & large phone (≤640px) */
        @media (max-width: 640px) {
            body {
                padding: 1.5rem 0.75rem;
                padding-bottom: calc(1.5rem + env(safe-area-inset-bottom, 0px));
            }

            .container {
                gap: 1rem;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.75rem;
            }

            .header-text h1 {
                font-size: clamp(1.4rem, 5vw, 1.8rem);
            }

            .lang-switch {
                align-self: flex-end;
            }

            .card {
                padding: 1.2rem;
                border-radius: 14px;
            }

            /* Tabs: display all evenly without scroll */
            .tabs-container {
                display: flex;
                width: 100%;
                margin-bottom: 1.2rem;
            }

            .tab-btn {
                padding: 0.5rem 0.2rem;
                font-size: 0.75rem;
                white-space: nowrap;
            }

            .grid-layout {
                grid-template-columns: 1fr;
                gap: 1rem;
            }

            /* Version selector: stack on mobile */
            .version-selector {
                flex-wrap: wrap !important;
            }

            .version-selector label {
                width: 100%;
                margin-bottom: 0.3rem !important;
            }

            /* Enlarge touch targets */
            input[type="text"], input[type="number"], select {
                padding: 0.8rem 0.9rem;
                font-size: 16px; /* Prevents iOS zoom on focus */
                min-height: 44px; /* Apple HIG touch target */
            }

            .tag {
                padding: 0.4rem 0.8rem;
                font-size: 0.8rem;
                min-height: 36px;
                display: inline-flex;
                align-items: center;
            }

            /* Command box: stack vertically */
            .command-box {
                flex-direction: column;
                gap: 0.8rem;
                align-items: stretch;
            }

            .command-text {
                margin-right: 0;
                font-size: 0.8rem;
                word-break: break-all;
                overflow-wrap: anywhere;
            }

            .copy-btn {
                align-self: stretch;
                text-align: center;
                padding: 0.7rem 1rem;
                min-height: 44px;
            }

            /* Input group: allow wrapping */
            .input-group {
                flex-wrap: wrap;
            }

            .input-group > * {
                min-width: 0;
            }

            /* Toast: center on mobile */
            .toast {
                left: 1rem;
                right: 1rem;
                bottom: calc(1rem + env(safe-area-inset-bottom, 0px));
                text-align: center;
                justify-content: center;
            }

            /* Search dropdown: full width & better touch */
            .search-dropdown {
                max-height: 180px;
            }

            .dropdown-item {
                padding: 0.75rem 1rem;
                min-height: 44px;
            }

            .selected-item {
                font-size: 0.75rem;
            }

            hr {
                margin: 1.2rem 0;
            }
        }

        /* Small phone (≤380px, e.g. iPhone SE, small Android) */
        @media (max-width: 380px) {
            body {
                padding: 1rem 0.5rem;
            }

            .header-text h1 {
                font-size: 1.2rem;
            }

            .card {
                padding: 1rem;
                border-radius: 12px;
            }

            .tab-btn {
                padding: 0.45rem 0.75rem;
                font-size: 0.75rem;
            }

            .form-group label {
                font-size: 0.8rem;
            }

            .command-text {
                font-size: 0.72rem;
            }

            .param-badge {
                font-size: 0.65rem !important;
            }
        }

        /* Very tall phones / notched phones */
        @supports (padding: env(safe-area-inset-top)) {
            body {
                padding-left: max(0.75rem, env(safe-area-inset-left));
                padding-right: max(0.75rem, env(safe-area-inset-right));
            }
        }

        /* Landscape phone */
        @media (max-height: 500px) and (orientation: landscape) {
            body {
                padding: 1rem 2rem;
            }

            .grid-layout {
                grid-template-columns: 1fr 1fr;
            }
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .form-group label {
            font-weight: 500;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-main);
        }

        .form-group label .param-badge {
            background: #f0f0f2;
            padding: 0.1rem 0.4rem;
            border-radius: 4px;
            font-family: 'SF Mono', 'Menlo', monospace;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .collapsible-group {
            overflow: hidden;
            max-height: 0;
            opacity: 0;
            transform: translateY(-10px);
            transition: max-height 0.3s ease, opacity 0.3s ease, transform 0.3s ease;
        }

        .collapsible-group.show {
            max-height: 100px;
            opacity: 1;
            transform: translateY(0);
        }

        .input-group {
            display: flex;
            gap: 0.5rem;
        }

        input[type="text"], input[type="number"], select {
            width: 100%;
            background: var(--bg-body);
            border: 1.5px solid transparent;
            color: var(--text-main);
            padding: 0.7rem 0.9rem;
            border-radius: var(--radius-md);
            font-size: 0.9rem;
            transition: var(--transition);
            outline: none;
        }

        input[type="text"]:focus, input[type="number"]:focus, select:focus {
            background: var(--bg-card);
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.15);
        }

        input::placeholder {
            color: #a1a1a6;
        }

        .tag-container {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-top: 0.2rem;
        }

        .tag {
            background: var(--bg-body);
            border: 1px solid transparent;
            padding: 0.3rem 0.7rem;
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            user-select: none;
            color: var(--text-muted);
        }

        .tag:hover {
            background: #e5e5ea;
            color: var(--text-main);
        }

        .tag:active {
            transform: scale(0.95);
        }

        .tag.active {
            background: var(--text-main);
            color: var(--bg-card);
        }

        /* Searchable Select */
        .searchable-select {
            position: relative;
        }

        .search-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            margin-top: 0.4rem;
            max-height: 200px;
            overflow-y: auto;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .search-dropdown.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .dropdown-item {
            padding: 0.6rem 1rem;
            cursor: pointer;
            border-bottom: 1px solid var(--bg-body);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.875rem;
            transition: background 0.2s;
        }

        .dropdown-item:last-child {
            border-bottom: none;
        }

        .dropdown-item:hover {
            background: var(--bg-body);
        }

        .dropdown-item .zh-name {
            color: var(--text-main);
        }

        .dropdown-item .en-name {
            color: var(--text-muted);
            font-family: 'SF Mono', 'Menlo', monospace;
            font-size: 0.75rem;
        }

        .selected-items {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .selected-item {
            background: #f0f0f2;
            color: var(--text-main);
            padding: 0.3rem 0.7rem;
            border-radius: var(--radius-sm);
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .selected-item .remove {
            cursor: pointer;
            color: var(--text-muted);
            font-size: 1.1rem;
            line-height: 1;
            transition: color 0.2s;
        }

        .selected-item .remove:hover {
            color: #ff3b30;
        }

        /* Command Preview Box */
        .command-section {
            margin-top: 1.5rem;
        }

        .command-box {
            background: #f2f2f7;
            border: 1px solid #e5e5ea;
            border-radius: var(--radius-md);
            padding: 1rem 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: none;
            transition: all 0.3s ease;
        }

        .command-text {
            font-family: 'SF Mono', 'Menlo', monospace;
            font-size: 0.95rem;
            color: #1d1d1f;
            font-weight: 500;
            word-break: break-all;
            margin-right: 1rem;
            flex: 1;
            letter-spacing: -0.01em;
        }

        .copy-btn {
            background: #ffffff;
            border: 1px solid #d1d1d6;
            color: #1d1d1f;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s ease;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .copy-btn:hover {
            background: #f5f5f7;
            transform: translateY(-1px);
            box-shadow: 0 2px 5px rgba(0,0,0,0.08);
        }

        .copy-btn:active {
            transform: translateY(0);
            background: #e5e5ea;
            box-shadow: none;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 2rem;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: var(--text-main);
            border: 1px solid rgba(0,0,0,0.05);
            padding: 1rem 1.5rem;
            border-radius: 100px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.12);
            display: flex;
            align-items: center;
            gap: 0.6rem;
            transform: translateY(150%) scale(0.9);
            opacity: 0;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s ease;
            z-index: 1000;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .toast.show {
            transform: translateY(0) scale(1);
            opacity: 1;
        }

        hr {
            border: 0;
            border-top: 1px solid var(--border-color);
            margin: 2rem 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div class="header-text">
                <h1 data-i18n="title">CoreProtect</h1>

            </div>
            <button class="lang-switch" id="langSwitch">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
                <span data-i18n="lang_switch">English</span>
            </button>
        </div>

        <div class="card">
            <div class="tabs-container" id="commandTabs">
                <div class="tab-slider" id="tabSlider"></div>
                <button class="tab-btn active" data-cmd="lookup" data-index="0"><span data-i18n="lookup">查询 (Lookup)</span></button>
                <button class="tab-btn" data-cmd="rollback" data-index="1"><span data-i18n="rollback">回滚 (Rollback)</span></button>
                <button class="tab-btn" data-cmd="restore" data-index="2"><span data-i18n="restore">恢复 (Restore)</span></button>
            </div>

            
        <div class="version-selector" style="margin-bottom: 2rem; display: flex; gap: 0.5rem; align-items: center; background: var(--bg-card); padding: 0.8rem 1rem; border-radius: var(--radius-md); border: 1px solid var(--border-color); box-shadow: var(--shadow-sm);">
            <label style="font-size: 0.85rem; font-weight: 500; margin-right: 0.5rem;" data-i18n="version">Minecraft 版本</label>
            <select id="majorVersion" style="width: auto; flex: 1; padding: 0.4rem; cursor: pointer;"></select>
            <select id="minorVersion" style="width: auto; flex: 1; padding: 0.4rem; cursor: pointer;"></select>
        </div>
        <div class="grid-layout">

                <!-- User -->
                <div class="form-group searchable-select" id="userGroup">
                    <label><span data-i18n="user">玩家/实体</span> <span class="param-badge">u:</span></label>
                    <input type="text" id="paramUser" data-i18n-ph="user_ph" placeholder="例如 Notch 或输入实体名称..." autocomplete="off">
                    <div class="search-dropdown" id="userDropdown"></div>
                    <div class="selected-items" id="userItems"></div>
                    <div class="tag-container" style="margin-top:0.4rem;">
                        <span class="tag" data-target="paramUser" data-val="#fire">#fire</span>
                        <span class="tag" data-target="paramUser" data-val="#tnt">#tnt</span>
                        <span class="tag" data-target="paramUser" data-val="#explosion">#explosion</span>
                    </div>
                </div>

                <!-- Time -->
                <div class="form-group">
                    <label><span data-i18n="time">时间</span> <span class="param-badge">t:</span></label>
                    <div class="input-group">
                        <input type="number" id="paramTimeVal" min="1" data-i18n-ph="time_val_ph" placeholder="数值" value="1" style="flex: 2;">
                        <select id="paramTimeUnit" style="flex: 1;">
                            <option value="w" data-i18n="time_w">周 (w)</option>
                            <option value="d" data-i18n="time_d">天 (d)</option>
                            <option value="h" data-i18n="time_h" selected>小时 (h)</option>
                            <option value="m" data-i18n="time_m">分钟 (m)</option>
                            <option value="s" data-i18n="time_s">秒 (s)</option>
                        </select>
                    </div>
                </div>

                <!-- Radius -->
                <div class="form-group">
                    <label><span data-i18n="radius">范围 / 世界</span> <span class="param-badge">r:</span></label>
                    <div class="input-group">
                        <select id="paramRadiusType" style="flex: 1.2;">
                            <option value="radius" data-i18n="radius_opt">指定半径</option>
                            <option value="world" data-i18n="world_opt">指定世界</option>
                            <option value="#global" data-i18n="global_opt">全局操作</option>
                            <option value="#worldedit" data-i18n="we_opt">WorldEdit 选区</option>
                        </select>
                        <input type="number" id="paramRadiusVal" min="1" value="10" data-i18n-ph="radius_ph" placeholder="格数" style="flex: 1;">
                        <select id="paramRadiusWorld" style="flex: 1; display: none;">
                            <option value="#world" data-i18n="ow_opt">主世界</option>
                            <option value="#world_nether" data-i18n="nether_opt">下界</option>
                            <option value="#world_the_end" data-i18n="end_opt">末地</option>
                        </select>
                    </div>
                </div>

                <!-- Action -->
                <div class="form-group">
                    <label><span data-i18n="action">行为</span> <span class="param-badge">a:</span></label>
                    <select id="paramAction">
                        <option value="" data-i18n="action_any">不限</option>
                        <optgroup label="Blocks" data-i18n-label="action_group_blocks">
                            <option value="block" data-i18n="action_block">放置/破坏 (block)</option>
                            <option value="+block" data-i18n="action_plus_block">仅放置 (+block)</option>
                            <option value="-block" data-i18n="action_minus_block">仅破坏 (-block)</option>
                        </optgroup>
                        <optgroup label="Inventory" data-i18n-label="action_group_inv">
                            <option value="item" data-i18n="action_item">丢弃/拾取 (item)</option>
                            <option value="+item" data-i18n="action_plus_item">仅拾取 (+item)</option>
                            <option value="-item" data-i18n="action_minus_item">仅丢弃 (-item)</option>
                            <option value="inventory" data-i18n="action_inventory">背包 (inventory)</option>
                            <option value="+inventory" data-i18n="action_plus_inventory">仅放入背包 (+inventory)</option>
                            <option value="-inventory" data-i18n="action_minus_inventory">仅从背包取出 (-inventory)</option>
                            <option value="container" data-i18n="action_container">容器 (container)</option>
                            <option value="+container" data-i18n="action_plus_container">仅放入容器 (+container)</option>
                            <option value="-container" data-i18n="action_minus_container">仅从容器取出 (-container)</option>
                        </optgroup>
                        <optgroup label="Other" data-i18n-label="action_group_other">
                            <option value="kill" data-i18n="action_kill">击杀 (kill)</option>
                            <option value="click" data-i18n="action_click">点击 (click)</option>
                            <option value="chat" data-i18n="action_chat">聊天 (chat)</option>
                            <option value="command" data-i18n="action_command">指令 (command)</option>
                            <option value="session" data-i18n="action_session">登入/登出 (session)</option>
                            <option value="sign" data-i18n="action_sign">告示牌 (sign)</option>
                        </optgroup>
                    </select>
                </div>

                <!-- Include -->
                <div class="form-group searchable-select" id="includeGroup">
                    <label><span data-i18n="include">包含</span> <span class="param-badge">i:</span></label>
                    <input type="text" id="paramIncludeSearch" data-i18n-ph="include_ph" placeholder="搜索方块/实体..." autocomplete="off">
                    <div class="search-dropdown" id="includeDropdown"></div>
                    <div class="selected-items" id="includeItems"></div>
                </div>

                <!-- Exclude -->
                <div class="form-group searchable-select" id="excludeGroup">

        function animateHeightChange(element, actionCallback) {
            if (!element || !element.animate) {
                actionCallback();
                return;
            }
            const oldHeight = element.getBoundingClientRect().height;
            actionCallback();
            const newHeight = element.getBoundingClientRect().height;
            if (oldHeight !== newHeight) {
                const oldOverflow = element.style.overflow;
                element.style.overflow = 'hidden';
                const animation = element.animate([
                    { height: oldHeight + 'px' },
                    { height: newHeight + 'px' }
                ], {
                    duration: 300,
                    easing: 'cubic-bezier(0.25, 0.8, 0.25, 1)'
                });
                animation.onfinish = () => {
                    element.style.overflow = oldOverflow;
                };
            }
        }

            {"id": "ominous_vault", "en": "Ominous Vault", "zh": "不祥宝库", "s": "buxiangbaoku ominous vault 不祥宝库 bxbk ominous_vault", "t": "block", "v": "1.21", "vi": 121000},
            {"id": "ominous_bottle", "en": "Ominous Bottle", "zh": "不祥之兆药水", "s": "buxiangzhizhaoyaoshui ominous bottle 不祥之兆药水 bxzzys ominous_bottle", "t": "item", "v": "1.21", "vi": 121000}
        );
        const CP_VERSIONS = {"1.21": "26.2", "1.20": "22.4", "1.19": "21.3", "1.18": "20.4", "1.17": "20.1", "1.16": "19.5", "1.15": "19.0", "1.14": "2.17.5", "1.13": "2.16.3"};
        const VERSIONS = {"majors": ["1.21", "1.20", "1.19", "1.18", "1.17", "1.16", "1.15", "1.14", "1.13"], "minors": {"1.21": ["1.21.11", "1.21.10", "1.21.9", "1.21.8", "1.21.7", "1.21.6", "1.21.5", "1.21.4", "1.21.3", "1.21.2", "1.21.1", "1.21"], "1.20": ["1.20.4", "1.20.2", "1.20.1"], "1.19": ["1.19.4", "1.19.2"], "1.18": ["1.18.2"], "1.17": ["1.17.1"], "1.16": ["1.16.5"], "1.15": ["1.15.2"], "1.14": ["1.14.4"], "1.13": ["1.13.2"]}};

        let currentLang = 'zh';
        let currentCommand = 'lookup';
        
        let currentVersionInt = 9999999;
        
        const majorSelect = document.getElementById('majorVersion');
        const minorSelect = document.getElementById('minorVersion');

        function initVersionSelector() {
            majorSelect.innerHTML = VERSIONS.majors.map(m => `<option value="${m}">${m}</option>`).join('');
            
            majorSelect.addEventListener('change', () => {
                const major = majorSelect.value;
                minorSelect.innerHTML = VERSIONS.minors[major].map(m => `<option value="${m}">${m}</option>`).join('');
                updateVersionInt();
            });

            minorSelect.addEventListener('change', updateVersionInt);

            majorSelect.dispatchEvent(new Event('change'));
        }

        function updateVersionInt() {
            const v = minorSelect.value;
            const parts = v.split('.');
            const major = parseInt(parts[0]) || 1;
            const minor = parseInt(parts[1]) || 0;
            const patch = parseInt(parts[2]) || 0;
            currentVersionInt = major * 100000 + minor * 1000 + patch;
            
            renderSelectedItems(state.include, includeItems);
            renderSelectedItems(state.exclude, excludeItems);
            renderSelectedItems(state.user, userItems, true);
            updateCommand();
        }

        const state = { include: new Set(), exclude: new Set(), user: new Set() };
        
        const includeSearch = document.getElementById('paramIncludeSearch');
        const excludeSearch = document.getElementById('paramExcludeSearch');
        const includeDropdown = document.getElementById('includeDropdown');
        const excludeDropdown = document.getElementById('excludeDropdown');
        const includeItems = document.getElementById('includeItems');
        const excludeItems = document.getElementById('excludeItems');
        
        const userSearch = document.getElementById('paramUser');
        const userDropdown = document.getElementById('userDropdown');
        const userItems = document.getElementById('userItems');

        function setupSearchable(searchInput, dropdown, set, itemsContainer, isUser = false) {
            searchInput.addEventListener('input', () => {
                let query = searchInput.value.toLowerCase().trim();
                let prefix = '';
                if (!isUser && (query.startsWith('+') || query.startsWith('-'))) {
                    prefix = query[0];
                    query = query.substring(1).trim();
                }
                if (!query) return dropdown.classList.remove('show');
                
                const queryParts = query.split(/\s+/);
                
                const filtered = MC_DATA.filter(item => {
                    let itemVi = item.vi === 1013000 ? 113000 : item.vi;
                    if (itemVi > currentVersionInt) return false;
                    if (isUser && item.t !== 'entity') return false; 
                    return queryParts.every(part => item.s.includes(part));
                }).slice(0, 30);
                
                if (filtered.length > 0) {
                    dropdown.innerHTML = filtered.map(item => {
                        let finalId = item.id;
                        let labelId = item.id;
                        if (isUser) {
                            finalId = '#' + finalId;
                            labelId = '#' + labelId;
                        } else if (prefix) {
                            finalId = prefix + finalId;
                            labelId = prefix + labelId;
                        }
                        return `
                            <div class="dropdown-item" data-id="${finalId}">
                                <span class="zh-name">${prefix}${currentLang === 'zh' ? item.zh : item.en}</span>
                                <span class="en-name">${labelId}</span>
                            </div>
                        `;
                    }).join('');
                } else {
                    dropdown.innerHTML = `<div class="dropdown-item" style="color:var(--text-muted); cursor:default;">${i18nData[currentLang].search_empty}</div>`;
                }
                dropdown.classList.add('show');
            });

            searchInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    let rawVal = searchInput.value.trim().toLowerCase().replace(/ /g, '_');
                    if (rawVal) {
                        let prefix = '';
                        let cleanVal = rawVal;
                        if (!isUser && (cleanVal.startsWith('+') || cleanVal.startsWith('-'))) {
                            prefix = cleanVal[0];
                            cleanVal = cleanVal.substring(1);
                        }
                        let hasHash = false;
                        if (cleanVal.startsWith('#')) {
                            hasHash = true;
                            cleanVal = cleanVal.substring(1);
                        }
                        if (isUser && !hasHash && (MC_DATA.some(d => d.id === cleanVal) || ['fire', 'tnt', 'explosion', 'water', 'lava'].includes(cleanVal))) {
                            hasHash = true;
                        }
                        let val = prefix + (hasHash ? '#' : '') + cleanVal;
                        set.add(val);
                        renderSelectedItems(set, itemsContainer, isUser);
                        searchInput.value = '';
                        dropdown.classList.remove('show');
                        updateCommand();
                    }
                }
            });

            dropdown.addEventListener('mousedown', (e) => {
                const item = e.target.closest('.dropdown-item');
                if (item && item.dataset.id) {
                    set.add(item.dataset.id);
                    renderSelectedItems(set, itemsContainer, isUser);
                    searchInput.value = '';
                    dropdown.classList.remove('show');
                    updateCommand();
                }
            });

            searchInput.addEventListener('blur', () => {
                setTimeout(() => dropdown.classList.remove('show'), 150);
            });
            
            searchInput.addEventListener('focus', () => {
                if (searchInput.value.trim() !== '') {
                    dropdown.classList.add('show');
                }
            });
        }

        function renderSelectedItems(set, container, isUser = false) {
            animateHeightChange(container, () => {
                container.innerHTML = Array.from(set).map(id => {
                    let prefix = '';
                    let cleanId = id;
                    if (!isUser && (cleanId.startsWith('+') || cleanId.startsWith('-'))) {
                        prefix = cleanId[0];
                        cleanId = cleanId.substring(1);
                    }
                    let hasHash = false;
                    if (cleanId.startsWith('#')) {
                        hasHash = true;
                        cleanId = cleanId.substring(1);
                    }
                    
                    const data = MC_DATA.find(d => d.id === cleanId);
                    let label = id;
                    let isInvalid = false;
                    
                    if (data) {
                        const localName = currentLang === 'zh' ? data.zh : data.en;
                        label = `${prefix}${localName} (${id})`;
                        let dataVi = data.vi === 1013000 ? 113000 : data.vi;
                        if (dataVi > currentVersionInt) isInvalid = true;
                    }
                    
                    const invalidStyle = isInvalid ? 'text-decoration: line-through; opacity: 0.5; color: red;' : '';
                    return `<div class="selected-item" style="${invalidStyle}"><span title="${isInvalid ? '该版本不存在此物品' : ''}">${label}</span><span class="remove" data-id="${id}">×</span></div>`;
                }).join('');
                
                container.querySelectorAll('.remove').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        set.delete(e.target.dataset.id);
                        renderSelectedItems(set, container, isUser);
                        updateCommand();
                    });
                });
            });
        }

        setupSearchable(includeSearch, includeDropdown, state.include, includeItems);
        setupSearchable(excludeSearch, excludeDropdown, state.exclude, excludeItems);
        setupSearchable(userSearch, userDropdown, state.user, userItems, true);
        initVersionSelector();

        // Preset tag handlers
        document.querySelectorAll('.tag[data-target]').forEach(tag => {
            tag.addEventListener('click', () => {
                const targetId = tag.dataset.target;
                const val = tag.dataset.val;
                if (targetId === 'paramUser') {
                    state.user.add(val);
                    renderSelectedItems(state.user, userItems, true);
                    updateCommand();
                }
            });
        });

        const hashtagsMap = {
            lookup: [
                {id: '#count', label: '#count'}
            ],
            rollback: [
                {id: '#preview', label: '#preview'},
                {id: '#count', label: '#count'},
                {id: '#silent', label: '#silent'},
                {id: '#verbose', label: '#verbose'}
            ],
            restore: [
                {id: '#preview', label: '#preview'},
                {id: '#count', label: '#count'},
                {id: '#silent', label: '#silent'},
                {id: '#verbose', label: '#verbose'}
            ]
        };

        function initHashtags() {
            hashtagContainer.innerHTML = hashtagsMap[currentCommand].map(tag => `
                <span class="tag hashtag-tag" data-val="${tag.id}">${tag.label}</span>
            `).join('');

            document.querySelectorAll('.hashtag-tag').forEach(tag => {
                tag.addEventListener('click', () => {
                    tag.classList.toggle('active');
                    updateCommand();
                });
            });
        }

        
        // Tab Switching Logic
        const tabBtns = document.querySelectorAll('.tab-btn');
        const tabSlider = document.getElementById('tabSlider');
        const paginationGroup = document.getElementById('paginationGroup');
        const hashtagGroup = document.getElementById('hashtagGroup');
        
        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                tabBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                const index = btn.dataset.index;
                tabSlider.style.transform = `translateX(${index * 100}%)`;
                
                currentCommand = btn.dataset.cmd;
                
                if (currentCommand === 'lookup') {
                    paginationGroup.style.display = 'flex';
                    void paginationGroup.offsetWidth; // 触发重绘
                    paginationGroup.classList.add('show');
                } else {
                    paginationGroup.classList.remove('show');
                    setTimeout(() => {
                        if (currentCommand !== 'lookup') {
                            paginationGroup.style.display = 'none';
                        }
                    }, 300);
                }
                
                initHashtags();
                updateCommand();
            });
        });

        // Language Switching Logic
        const langSwitchBtn = document.getElementById('langSwitch');
        function switchLang() {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            langSwitchBtn.querySelector('span').textContent = i18nData[currentLang].lang_switch;
            
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.dataset.i18n;
                if (i18nData[currentLang][key]) {
                    el.textContent = i18nData[currentLang][key];
                }
            });
            
            document.querySelectorAll('[data-i18n-ph]').forEach(el => {
                const key = el.dataset.i18nPh;
                if (i18nData[currentLang][key]) {
                    el.placeholder = i18nData[currentLang][key];
                }
            });
            
            renderSelectedItems(state.include, includeItems);
            renderSelectedItems(state.exclude, excludeItems);
            renderSelectedItems(state.user, userItems, true);
        }
        
        if (langSwitchBtn) {
            langSwitchBtn.addEventListener('click', switchLang);
        }

        // Add event listeners to inputs to trigger updateCommand
        document.querySelectorAll('input, select').forEach(el => {
            if (el.id !== 'paramIncludeSearch' && el.id !== 'paramExcludeSearch' && el.id !== 'paramUser') {
                el.addEventListener('input', updateCommand);
                el.addEventListener('change', updateCommand);
            }
        });
        
        document.getElementById('paramRadiusType').addEventListener('change', (e) => {
            const isWorld = e.target.value === 'world';
            document.getElementById('paramRadiusVal').style.display = isWorld ? 'none' : 'block';
            document.getElementById('paramRadiusWorld').style.display = isWorld ? 'block' : 'none';
        });
        
        document.getElementById('paramUser').addEventListener('input', updateCommand);
        document.getElementById('paramUser').addEventListener('blur', updateCommand);


        function updateCommand() {
            let cmd = `/co ${currentCommand}`;
            
            let users = Array.from(state.user);
            let textUser = document.getElementById('paramUser').value.trim();
            if (textUser) {
                let textUserLower = textUser.toLowerCase().replace(/ /g, '_');
                if (!textUser.startsWith('#') && (MC_DATA.some(d => d.id === textUserLower) || ['fire', 'tnt', 'explosion', 'water', 'lava'].includes(textUserLower))) {
                    textUser = '#' + textUserLower;
                }
                users.push(textUser);
            }
            if (users.length > 0) cmd += ` u:${users.join(',')}`;

            const timeVal = document.getElementById('paramTimeVal').value;
            const timeUnit = document.getElementById('paramTimeUnit').value;
            if (timeVal) cmd += ` t:${timeVal}${timeUnit}`;

            const rType = document.getElementById('paramRadiusType').value;
            if (rType === 'radius') {
                const rVal = document.getElementById('paramRadiusVal').value;
                if (rVal) cmd += ` r:${rVal}`;
            } else if (rType === 'world') {
                cmd += ` r:${document.getElementById('paramRadiusWorld').value}`;
            } else {
                cmd += ` r:${rType}`;
            }

            const action = document.getElementById('paramAction').value;
            if (action) cmd += ` a:${action}`;

            if (state.include.size > 0) cmd += ` i:${Array.from(state.include).join(',')}`;
            if (state.exclude.size > 0) cmd += ` e:${Array.from(state.exclude).join(',')}`;

            const activeTags = Array.from(document.querySelectorAll('.hashtag-tag.active')).map(t => t.dataset.val);
            if (activeTags.length > 0) cmd += ` ${activeTags.join(' ')}`;

            if (currentCommand === 'lookup') {
                const page = document.getElementById('paramPage').value;
                const lines = document.getElementById('paramLines').value;
                if (page || lines) cmd += ` ${page || '1'}:${lines || '5'}`;
            }

            animateHeightChange(document.querySelector('.command-box'), () => {
                document.getElementById('commandOutput').textContent = cmd;
            });
        }

        document.getElementById('copyBtn').addEventListener('click', () => {
            const outText = document.getElementById('commandOutput').textContent;
            navigator.clipboard.writeText(outText).then(() => {
                const toast = document.getElementById('toast');
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2500);
            });
        });
    </script>
</body>
</html>
